<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.header { text-align: center; color: white; margin-bottom: 30px; }
.header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

.card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; }
.card.active { display: block; }
.progress { text-align: center; margin-bottom: 20px; color: #666; }
.progress-bar { width: 100%; height: 10px; background: #e0e0e0; border-radius: 5px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
.product-image { width: 100%; max-height: 600px; object-fit: contain; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: block; margin: 20px auto; }
.answer-info { background: #f8f9ff; padding: 20px; border-radius: 10px; margin: 20px 0; display: none; animation: fadeIn 0.5s; }

.answer-info.show { display: block; }

.question-hint { text-align: center; font-size: 1.3em; color: #333; margin: 20px 0; font-weight: bold; }
.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }
.option-btn { padding: 20px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; transition: all 0.3s; font-family: inherit; }

.option-btn.correct { background: #4CAF50; border-color: #4CAF50; color: white; }
.option-btn.wrong { background: #f44336; border-color: #f44336; color: white; }
.option-btn:disabled { cursor: not-allowed; transform: none; }
.result-header { text-align: center; margin-bottom: 40px; }
.result-header h2 { font-size: 2.5em; color: #333; margin-bottom: 20px; }
.score-circle { width: 200px; height: 200px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 3em; font-weight: bold; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 40px 0; }
.stat-item { text-align: center; padding: 20px; background: #f8f9ff; border-radius: 10px; }
.stat-item .number { font-size: 2.5em; font-weight: bold; color: #667eea; }
.stat-item .label { color: #666; margin-top: 5px; }
.wrong-answers { margin-top: 40px; }
.wrong-answers h3 { color: #f44336; margin-bottom: 20px; font-size: 1.5em; }
.wrong-item { padding: 15px; margin-bottom: 10px; background: #fff5f5; border-left: 4px solid #f44336; border-radius: 5px; }
.wrong-item .correct-answer { font-weight: bold; color: #4CAF50; margin-bottom: 5px; }
.wrong-item .your-answer { color: #f44336; font-size: 0.95em; }
.btn-primary { display: block; width: 100%; max-width: 300px; margin: 30px auto 0; padding: 15px 30px; font-size: 1.2em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.3s; font-family: inherit; }

.series-btn { padding: 20px; border: 2px solid #667eea; border-radius: 10px; background: white; cursor: pointer; transition: all 0.3s; font-family: inherit; text-align: left; }

const allProductNames = ["3D大板-松树皮", "3D涂装 3D大板-木纹", "3D涂装 云砂罗马柱", "3D涂装 云龙", "3D涂装 和清水泥", "3D涂装 意大利洞石", "3D涂装 意大利灰山石", "3D涂装 日落金山", "3D涂装棕沙石", "3D艺术喷涂木浇筑板", "丹霞夯土（细纹）", "云砂洞石", "保利木", "克里斯灰线石", "几何马赛克", "卡洛斯", "原始古木", "原木波纹板", "和清水泥罗马柱", "土砖墙", "城墙夯土", "大洞石", "天山岩3D打印系列", "安藤清水泥", "小圆罗马柱凸面", "小圆罗马柱凹面", "小山丘", "山丘", "山丘（JM）", "岁月流水石", "岁月石", "峭壁岩", "布纹石", "律动线石", "意大利大洞石", "意大利木纹", "戈壁夯土（粗纹）", "斧凿石", "斧开石", "新款粗纹碳化木", "新洞石", "新流水石", "新线石", "星月石", "木格", "木模水泥板", "木浇筑板", "毛面花岗岩", "毛面花岗岩3D打印系列", "水波纹板", "水泥浇筑板", "洞石马赛克（JM）", "海洞石", "海洞石大堡礁", "清水泥板", "禅岩木纹", "禅清水泥-两孔清水板", "禅清水泥-四孔清水板", "窑洞夯土板", "米兰洞石", "粗纹线石", "素影洞石", "纯色洞石", "线画洞石", "罗维纳洞石", "罗马大洞石", "罗马洞石", "罗马马赛克（凹）(FS)", "脉络石", "脊线石", "英安岩", "荒漠石（川岩石）", "莱姆石", "莱姆线石", "遗迹夯土", "鎏金洞石", "锈石板", "锯台木纹", "阡陌石", "阿曼线石", "马赛夯土板"];
const seriesList = ["柔性夯土板系列", "柔性木纹系列", "柔性洞石系列", "柔性石材综合款式系列"];
let currentIndex = 0, correctCount = 0, wrongAnswers = [], shuffledProducts = [], answered = false, selectedSeries = [];
function shuffle(array) { const newArray = [...array]; for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; } return newArray; }
function initSeriesGrid() {
  const grid = document.getElementById('seriesGrid');
  seriesList.forEach(series => {
    const count = allProducts.filter(p => p.series === series).length;
    const btn = document.createElement('div');
    btn.className = 'series-btn';
    btn.onclick = () => selectSeries(series);
    btn.innerHTML = `<div class="series-name">${series}</div><div class="series-count">${count} 个产品</div>`;
    grid.appendChild(btn);
  });
}
function selectSeries(series) {
  const btns = document.querySelectorAll('.series-btn');
  if (series === '全部') {
    btns.forEach(b => b.classList.remove('selected'));
    btns[0].classList.add('selected');
    selectedSeries = seriesList;
  } else {
    btns[0].classList.remove('selected');
    const clickedBtn = event.currentTarget;
    if (clickedBtn.classList.contains('selected')) {
      clickedBtn.classList.remove('selected');
      selectedSeries = selectedSeries.filter(s => s !== series);
    } else {
      clickedBtn.classList.add('selected');
      if (!selectedSeries.includes(series)) selectedSeries.push(series);
    }
  }
  const count = selectedSeries.length > 0 ? allProducts.filter(p => selectedSeries.includes(p.series)).length : 0;
  document.getElementById('selectedCount').textContent = count;
  document.getElementById('selectedInfo').style.display = count > 0 ? 'block' : 'none';
  document.getElementById('startBtn').style.display = count > 0 ? 'block' : 'none';
}
function startQuiz() {
  const filteredProducts = selectedSeries.length > 0 ? allProducts.filter(p => selectedSeries.includes(p.series)) : allProducts;
  shuffledProducts = shuffle(filteredProducts);
  currentIndex = 0;
  correctCount = 0;
  wrongAnswers = [];
  document.getElementById('startCard').classList.remove('active');
  document.getElementById('quizCard').classList.add('active');
  document.getElementById('resultCard').classList.remove('active');
  showQuestion();
}
function showQuestion() {
  answered = false;
  const product = shuffledProducts[currentIndex];
  document.getElementById('progressText').textContent = `题目 ${currentIndex + 1} / ${shuffledProducts.length}`;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / shuffledProducts.length) * 100 + '%';
  document.getElementById('productImage').src = product.image;
  document.getElementById('answerInfo').classList.remove('show');
  document.getElementById('questionHint').style.display = 'block';
  let options = [product.name];
  while (options.length < 4 && options.length < allProductNames.length) { const randomName = allProductNames[Math.floor(Math.random() * allProductNames.length)]; if (!options.includes(randomName)) options.push(randomName); }
  options = shuffle(options);
  const optionsContainer = document.getElementById('options');
  optionsContainer.innerHTML = '';
  options.forEach(option => { const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = option; btn.onclick = () => checkAnswer(option, product, btn); optionsContainer.appendChild(btn); });
}
function checkAnswer(selected, product, btn) {
  if (answered) return;
  answered = true;
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);
  const correct = product.name;
  document.getElementById('productImage').src = product.answer_image;
  document.getElementById('answerName').textContent = product.name;
  document.getElementById('answerColor').textContent = '颜色: ' + product.color;
  document.getElementById('answerInfo').classList.add('show');
  document.getElementById('questionHint').style.display = 'none';
  if (selected === correct) { btn.classList.add('correct'); correctCount++; }
  else { btn.classList.add('wrong'); wrongAnswers.push({ product: product, selected: selected }); buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); }); }
  setTimeout(() => { currentIndex++; if (currentIndex < shuffledProducts.length) showQuestion(); else showResult(); }, 1000);
}
function showResult() {
  document.getElementById('quizCard').classList.remove('active');
  document.getElementById('resultCard').classList.add('active');
  const percentage = Math.round((correctCount / shuffledProducts.length) * 100);
  document.getElementById('scoreCircle').textContent = percentage + '%';
  document.getElementById('totalCount').textContent = shuffledProducts.length;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongAnswers.length;
  if (wrongAnswers.length > 0) {
    document.getElementById('wrongAnswers').style.display = 'block';
    const wrongList = document.getElementById('wrongList');
    wrongList.innerHTML = '';
    wrongAnswers.forEach(item => { const div = document.createElement('div'); div.className = 'wrong-item'; div.innerHTML = `<div class="correct-answer">✓ 正确答案: ${item.product.full_name}</div><div class="your-answer">✗ 您的选择: ${item.selected}</div>`; wrongList.appendChild(div); });
  }
}
function restartQuiz() {
  document.getElementById('resultCard').classList.remove('active');
  document.getElementById('startCard').classList.add('active');
  document.getElementById('wrongAnswers').style.display = 'none';
  selectedSeries = [];
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('selectedInfo').style.display = 'none';
  document.getElementById('startBtn').style.display = 'none';
}
initSeriesGrid();
</script>
